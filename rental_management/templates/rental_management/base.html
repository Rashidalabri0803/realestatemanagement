{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}إدارة الإيجارات{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/bootstrap-rtl.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/rtl_custom.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_custom.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
        <a class="navbar-brand" href="/">إدارة الإيجارات</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="{% url 'building_list' %}">المباني</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'unit_list' %}">الوحدات</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'tenant_list' %}">المستأجرين</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'leasecontract_list' %}">العقود</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'maintenance_request_list' %}">الصيانة</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'expense_list' %}">المصاريف</a></li>
                <li class="nav-item"><a class="nav-link" href="">الاشعارات</a>
            </ul>
        </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    <footer class="mt-4">
        <div class="text-center">
            <p>جميع الحقوق محفوظة &copy; 2024</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/notifications.js' %}"></script>
    <script src="{% static 'js/maintenance.js' %}"></script>
</body>
</html>
