{% extends 'rental_management/base.html' %}

{% block title %}نموذج المبني{% endblock %}

{% block content %}
<h1 class="mb-4">{{ form.instance.id|default:"إضافة مبني جديد" }}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">حفظ</button>
    <a href="{% url 'buildings:list' %}" class="btn btn-secondary">إلغاء</a>
</form>
{% endblock %}
